name: Compile Prisma engines for armv7 and build image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  compile-prisma:
    name: Compile Prisma engines (armv7)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev ca-certificates git curl gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add armv7 target
        run: rustup target add armv7-unknown-linux-gnueabihf

      - name: Clone prisma-engines
        run: git clone https://github.com/prisma/prisma-engines.git

      - name: Build prisma engines for armv7
        run: |
          set -e
          cd prisma-engines
          # Try a release build for armv7; builds may require additional system dependencies.
          cargo build --release --target armv7-unknown-linux-gnueabihf || true

      - name: Collect built binaries
        run: |
          mkdir -p ./prisma-engines-artifacts
          # Copy any produced binaries (best-effort locations)
          find prisma-engines -type f -name 'query-engine*' -exec cp {} ./prisma-engines-artifacts/ \; || true
          find prisma-engines -type f -name 'migration-engine*' -exec cp {} ./prisma-engines-artifacts/ \; || true
          find prisma-engines -type f -name 'introspection-engine*' -exec cp {} ./prisma-engines-artifacts/ \; || true
          ls -la prisma-engines-artifacts || true

      - name: Upload prisma engine artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prisma-engines-armv7
          path: prisma-engines-artifacts

  build-and-push:
    name: Build and push linux/arm/v7 image
    needs: compile-prisma
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prisma engine artifacts
        uses: actions/download-artifact@v4
        with:
          name: prisma-engines-armv7
          path: prisma-engines

      - name: List engines
        run: ls -la prisma-engines || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image for linux/arm/v7
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/familyverse:armv7-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/familyverse:armv7-latest
