version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}

      DATABASE_URL: ${DATABASE_URL} # Path to SQLite DB inside the container
      NEXTAUTH_URL: ${NEXTAUTH_URL} # URL of your app
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET} 
    #volumes:
    #  - ./prisma:/app/prisma # Persists the SQLite database and migrations
    # The CMD ["npm", "start"] from your Dockerfile will be used to run the application.
